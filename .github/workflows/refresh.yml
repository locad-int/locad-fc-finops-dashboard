name: Auto-refresh Dashboard

on:
  schedule:
    - cron: '*/30 0-9 * * 1-6'   # every 30 min, midnight–9am UTC (8am–6pm PH time), Mon–Sat
  workflow_dispatch:
    inputs:
      headcount:
        description: 'Today headcount (0 = skip update)'
        required: false
        default: '0'

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch headcount if provided
        run: |
          python3 - <<'EOF'
          import os, re
          from datetime import date

          hc_str = os.environ.get("HC_INPUT", "0").strip()
          if not hc_str.isdigit() or int(hc_str) == 0:
              print("No headcount input — skipping patch")
              raise SystemExit(0)

          hc = int(hc_str)
          TODAY = date.today().isoformat()
          src = open("generate_dashboard.py").read()
          new = re.sub(rf"('{re.escape(TODAY)}':\s*)\d+", rf"\g<1>{hc}", src)
          if new != src:
              open("generate_dashboard.py", "w").write(new)
              print(f"Patched {TODAY} headcount → {hc}")
          else:
              print(f"No entry for {TODAY} found in script")
          EOF
        env:
          HC_INPUT: ${{ github.event.inputs.headcount || '0' }}

      - name: Regenerate dashboard HTML
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          python3 generate_dashboard.py
          cp locad-dashboard-latest.html index.html
          echo "Dashboard regenerated"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html generate_dashboard.py
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Auto-refresh: $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed updated dashboard"
          fi
