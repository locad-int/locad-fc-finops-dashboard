name: Auto-refresh Dashboard

on:
  schedule:
    - cron: '*/30 0-9 * * 1-6'   # every 30 min, midnight–9am UTC (8am–6pm PH time), Mon–Sat
  workflow_dispatch:               # also allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate dashboard HTML
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          python3 generate_dashboard.py
          cp locad-dashboard-latest.html index.html
          echo "Dashboard regenerated"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Auto-refresh: $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed updated dashboard"
          fi
